# HTTPS server for WebXR (required by browsers for immersive-vr)
server {
    listen 8443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /certs/server.crt;
    ssl_certificate_key /certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # WebXR + cross-origin headers
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "*" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    # Viewer root → built demo
    location / {
        root /viewer;
        index viewer.html index.html;
        try_files $uri $uri/ =404;
    }

    # Scene assets (mounted from /raid/git/gaussian-splatting/data)
    location /data/ {
        alias /scenes/;
        autoindex on;
    }

    # Larger upload/download for big PLY
    client_max_body_size 0;
    proxy_max_temp_file_size 0;
}

