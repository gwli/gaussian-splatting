      background: rgba(0,0,0,0.85); color: #fff; padding: 12px;
      border-radius: 8px; z-index: 10; display: flex; gap: 8px; flex-wrap: wrap;
    }
    #scenePicker a {
      color: #4cf; text-decoration: none; padding: 6px 12px;
      background: rgba(255,255,255,0.1); border-radius: 4px;
    }
    #scenePicker a:hover { background: rgba(255,255,255,0.25); }
    #scenePicker a.active { background: #4cf; color: #000; }
  </style>
</head>

  <script>
    // Visible log (DevTools is hard to access in headset)
    const _logEl = document.getElementById('status');
    _logEl.textContent = '';
    const _log = (msg, color = '#0f0') => {
      const t = new Date().toLocaleTimeString();
      _logEl.style.color = color;
      _logEl.textContent += `[${t}] ${msg}\n`;
      _logEl.scrollTop = _logEl.scrollHeight;
      console.log(msg);
    };
    window._log = _log;
    _log(`viewer.html @ ${location.href}`);
    _log(`crossOriginIsolated=${self.crossOriginIsolated} SAB=${typeof SharedArrayBuffer !== 'undefined'}`);

    // Capture fetch errors so we can see them in headset
    const _origFetch = window.fetch;
    window.fetch = function(...args) {
      const url = typeof args[0] === 'string' ? args[0] : args[0].url;
      _log(`fetch → ${String(url).slice(-70)}`);
      return _origFetch(...args)
        .then(r => {
          _log(`  ← ${r.status} ${r.statusText} (${r.headers.get('content-length') || '?'} B)`);
          if (!r.ok) _log(`  HTTP error!`, '#f55');
          return r;
        })
        .catch(e => {
          _log(`  fetch threw: ${e.message}`, '#f55');
          throw e;
        });
    };

    window.addEventListener('error', e => {
      _log(`window error: ${e.message} @ ${e.filename}:${e.lineno}`, '#f55');
    });
    window.addEventListener('unhandledrejection', e => {
      _log(`promise rejected: ${e.reason?.message || e.reason}`, '#f55');
    });
  </script>

  <script type="module">
    import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';
    import * as THREE from 'three';

    const log = window._log;

    const params = new URLSearchParams(location.search);
    const scene = params.get('scene') || 'scene_021';
    const customUrl = params.get('ply') || params.get('url');
    // Default to .ksplat (10x smaller than PLY, native format for this viewer)
    const format = params.get('format') || 'ksplat';
    // source: colmap (output/, 30k) | vggt (vggt/output/, 15k) | pano (<scene>_pano/output_pano/, 7k)
    const source = params.get('source') || 'colmap';
    function buildUrl(src) {
      const it = params.get('iter');
      if (src === 'vggt')  return `/data/8kpano/scenes/${scene}/vggt/output/point_cloud/iteration_${it||'15000'}/point_cloud.${format}`;
      if (src === 'pano')  return `/data/8kpano/scenes/${scene}_pano/output_pano/point_cloud/iteration_${it||(scene.includes('hf')?'15000':'7000')}/point_cloud.${format}`;
      return `/data/8kpano/scenes/${scene}/output/point_cloud/iteration_${it||'30000'}/point_cloud.${format}`;
    }
    const sceneUrl = customUrl || buildUrl(source);

    // Wire source toggle links (preserve current scene)
    document.getElementById('srcColmap').href = `?scene=${scene}&source=colmap`;
    document.getElementById('srcVggt').href = `?scene=${scene}&source=vggt`;
    document.getElementById('srcPano').href = `?scene=${scene}&source=pano`;
    document.getElementById('src' + (source.charAt(0).toUpperCase()+source.slice(1)))?.classList.add('active');

    document.querySelectorAll('#scenePicker a').forEach(a => {
      if (a.getAttribute('href') === `?scene=${scene}`) a.classList.add('active');
    });

    log(`Loading scene=${scene}`);

    try {
      const _v3 = (k, d) => (params.get(k) ? params.get(k).split(',').map(Number) : d);
      const viewer = new GaussianSplats3D.Viewer({
        'cameraUp': _v3('up', [0, -1, 0]),
        'initialCameraPosition': _v3('cam', [0, 0, 3]),
        'initialCameraLookAt': _v3('look', [0, 0, 0]),
        'webXRMode': GaussianSplats3D.WebXRMode.VR,
        'sharedMemoryForWorkers': false,
        'gpuAcceleratedSort': true,
      });
      log('Viewer constructed');

      // Format is auto-detected from extension (.ksplat / .ply / .splat / .spz)
      viewer.addSplatScene(sceneUrl, {
        'progressiveLoad': false,
        'showLoadingUI': true,
      })
      .then(() => {
        log(`✓ Loaded ${scene}. Click "Enter VR" (right corner) to view in PICO.`);
        viewer.start();
      })
      .catch(err => {
        log(`✗ addSplatScene failed: ${err.message}`, '#f55');
        if (err.stack) log(`stack: ${err.stack.slice(0, 500)}`, '#f99');
        if (err.cause) log(`cause: ${err.cause.message}`, '#f99');
      });
    } catch (err) {
      log(`✗ Viewer constructor threw: ${err.message}`, '#f55');
    }
  </script>
</body>
</html>
